name: Build on Eden Room Changes

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate that all patches still apply cleanly to latest Eden
  # ─────────────────────────────────────────────────────────────────────────
  patch-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone latest Eden (shallow)
        run: |
          git clone --depth=1 https://git.eden-emu.dev/eden-emu/eden.git eden-src
          echo "Eden commit: $(cd eden-src && git log -1 --format='%H %s')"

      - name: Extract and run patch scripts against Eden source
        run: |
          set -e
          cd eden-src

          echo "=== Extracting patch scripts from Dockerfile ==="

          # Parse each python3 heredoc block from the Dockerfile and run them one by one
          python3 << 'RUNNER'
          import subprocess, sys, re
          from pathlib import Path

          dockerfile = Path("../Dockerfile").read_text(encoding="utf-8")

          # Find all python3 heredoc blocks: RUN python3 - <<'PY' ... PY
          pattern = re.compile(r"RUN python3 - <<'PY'\n(.*?)\nPY", re.DOTALL)
          blocks = pattern.findall(dockerfile)

          print(f"Found {len(blocks)} patch script(s) to validate")
          failed = 0

          for i, block in enumerate(blocks, 1):
              print(f"\n--- Patch {i}/{len(blocks)} ---")
              result = subprocess.run(
                  ["python3", "-c", block],
                  capture_output=False,
                  text=True
              )
              if result.returncode != 0:
                  print(f"FAILED (exit code {result.returncode})")
                  failed += 1

          print(f"\n{'='*50}")
          if failed:
              print(f"❌ {failed}/{len(blocks)} patch(es) FAILED")
              sys.exit(1)
          else:
              print(f"✅ All {len(blocks)} patches applied successfully")
          RUNNER

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Check upstream Eden for changes, then build & push Docker image
  # ─────────────────────────────────────────────────────────────────────────
  check-and-build:
    runs-on: ubuntu-latest
    needs: patch-check
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Get latest Eden commit
        id: eden
        run: |
          COMMIT=$(git ls-remote https://git.eden-emu.dev/eden-emu/eden.git HEAD | awk '{print $1}')
          SHORT_COMMIT=$(echo $COMMIT | cut -c1-7)
          echo "Latest Eden commit: $SHORT_COMMIT"
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "short_commit=$SHORT_COMMIT" >> $GITHUB_OUTPUT

      - name: Check last built commit
        id: last_build
        run: |
          if [ -f ".last_eden_commit" ]; then
            LAST_COMMIT=$(cat .last_eden_commit)
            echo "Last built commit: $LAST_COMMIT"
            echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          else
            echo "No previous build found"
            echo "last_commit=" >> $GITHUB_OUTPUT
          fi

      - name: Clone Eden to check changes
        if: steps.last_build.outputs.last_commit != ''
        run: |
          git clone --depth 100 https://git.eden-emu.dev/eden-emu/eden.git eden-upstream

      - name: Check if eden-room files changed
        if: steps.last_build.outputs.last_commit != ''
        id: check_changes
        run: |
          cd eden-upstream

          LAST_COMMIT="${{ steps.last_build.outputs.last_commit }}"
          NEW_COMMIT="${{ steps.eden.outputs.commit }}"

          CHANGED_FILES=$(git diff --name-only $LAST_COMMIT $NEW_COMMIT 2>/dev/null || echo "force_build")

          if [ "$CHANGED_FILES" = "force_build" ]; then
            echo "Could not compare commits - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          RELEVANT_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^src/(dedicated_room|web_service|network|common/logging)/' || true)

          if [ -n "$RELEVANT_CHANGES" ]; then
            echo "Eden-room related files changed:"
            echo "$RELEVANT_CHANGES"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No eden-room files changed since last build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Force build if first run or manual
        id: final_check
        run: |
          if [ -z "${{ steps.last_build.outputs.last_commit }}" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=${{ steps.check_changes.outputs.should_build }}" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes
        if: steps.final_check.outputs.should_build == 'false'
        run: |
          echo "No eden-room changes detected. Exiting."
          exit 0

      - name: Set up Docker Buildx
        if: steps.final_check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.final_check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.final_check.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/eden-room-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/eden-room-server:${{ steps.eden.outputs.short_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update last built commit
        if: steps.final_check.outputs.should_build == 'true'
        run: |
          echo "${{ steps.eden.outputs.commit }}" > .last_eden_commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_eden_commit
          git diff --staged --quiet || git commit -m "Built from Eden commit ${{ steps.eden.outputs.short_commit }}"
          git push

      - name: Notify Discord (optional)
        if: steps.final_check.outputs.should_build == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            COMMIT="${{ steps.eden.outputs.short_commit }}"
            MESSAGE="✅ New Eden Room Server built from commit ${COMMIT} (eden-room files changed)"
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"${MESSAGE}\"}" || true
          else
            echo "Discord webhook not configured, skipping notification"
          fi
